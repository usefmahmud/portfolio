name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REPO_NAME: ${{ github.event.repository.name }}

jobs:
  prepare:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          printf '%s\n' '${{ secrets.APP_ENV }}' > .env
          echo "COMPOSE_PROJECT_NAME=${{ env.REPO_NAME }}" >> .env

  build:
    runs-on: [self-hosted, Linux, X64]
    needs: prepare
    steps:
      - name: Build docker image
        run: docker compose build portfolio

  pre-deploy:
    runs-on: [self-hosted, Linux, X64]
    needs: build
    steps:
      - name: Shutdown existing containers
        run: docker compose down --remove-orphans

      - name: Run database migrations
        if: ${{ contains(github.event.head_commit.message, '#migrate') || github.event_name == 'workflow_dispatch' }}
        run: docker compose run --rm migrate

  deploy:
    runs-on: [self-hosted, Linux, X64]
    needs: pre-deploy
    steps:
      - name: Start containers
        run: docker compose up -d